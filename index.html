  :root{
    --ink:#1C2541;

  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);

  }
  .wrap{max-width:820px;margin:0 auto;padding:28px 20px 80px;}

  header.masthead{
    border-bottom:3px double var(--ink);
    padding-bottom:16px;
    margin-bottom:24px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--brass);
    margin-bottom:6px;
  }
  h1{
    font-family:'Lora', serif;
    font-weight:700;
    font-size:32px;
    margin:0 0 4px;
    color:var(--ink);
  }
  .subtitle{
    font-size:14px;
    color:var(--ink-soft);
  }

  nav.tabs{
    display:flex;
    gap:2px;
    margin-bottom:24px;
    border:1px solid var(--ink);
    border-radius:2px;
    overflow:hidden;
  }
  nav.tabs button{
    flex:1;
    padding:12px 10px;
    background:var(--paper-raised);
    border:none;
    border-right:1px solid var(--line);
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  nav.tabs button:last-child{border-right:none;}
  nav.tabs button.active{
    background:var(--ink);
    color:var(--paper-raised);
  }
  nav.tabs button:hover:not(.active){background:#EFEADB;}

  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* --- Syllabus / Case Docket cards --- */
  .docket{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:3px;
    padding:18px 20px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .docket-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:12px;
    margin-bottom:8px;
  }
  .docket-num{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--brass);
    letter-spacing:0.08em;
  }
  .docket h3{
    font-family:'Lora', serif;
    font-size:18px;
    margin:2px 0 0;
    color:var(--ink);
  }
  .stamp{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:3px 9px;
    border:1.5px solid var(--sage);
    color:var(--sage);
    border-radius:2px;
    white-space:nowrap;
    transform:rotate(-2deg);
  }
  .stamp.pending{border-color:var(--line);color:var(--ink-soft);}
  ul.topics{
    margin:8px 0 0;
    padding-left:18px;
    font-size:14px;
    color:var(--ink-soft);
  }
  ul.topics li{margin-bottom:3px;}

  select#chapterSelect{
    width:100%;
    padding:12px 14px;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    border:1px solid var(--ink);
    border-radius:2px;
    background:var(--paper-raised);
    color:var(--ink);
    margin-bottom:18px;
  }

    border:1px solid var(--line);
    border-radius:3px;
    padding:22px;
    box-shadow:var(--shadow);

    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--brass);
    margin-bottom:10px;
    letter-spacing:0.05em;
  }
  .q-text{
    font-family:'Lora', serif;
    font-size:17px;
    margin:0 0 16px;
    color:var(--ink);
  }
  .opt{
    display:block;
    width:100%;
    text-align:left;
    padding:12px 14px;
    margin-bottom:8px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:2px;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    color:var(--ink);
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .opt:hover{border-color:var(--ink);}
  .opt.correct{background:#E9F2EC;border-color:var(--sage);color:var(--sage);font-weight:600;}
  .opt.wrong{background:#F6E9E7;border-color:var(--rust);color:var(--rust);font-weight:600;}

  .explain{
    margin-top:14px;
    padding:12px 14px;
    background:#F1EDE0;
    border-left:3px solid var(--brass);
    font-size:13.5px;

    border:none;
    border-radius:2px;
    font-family:'IBM Plex Mono', monospace;

  }

    height:8px;

    font-size:11px;

  .notes-body em{

    margin-top:16px;
    padding-top:12px;
    border-top:1px dashed var(--line);
    font-size:13px;
    color:var(--brass);
  }
  .notes-missing{
    text-align:center;
    padding:40px 20px;
    color:var(--ink-soft);
    font-size:14px;
  }
</style>
</head>

      <p>ഈ chapter ചെറുതാണ്, പക്ഷേ പ്രധാനപ്പെട്ട regulatory bodies-ന്റെ roles clear ആയി അറിഞ്ഞിരിക്കണം — MCQs-ൽ confuse ചെയ്യാൻ സാധ്യതയുള്ള topic ആണിത്.</p>

      <h2>Chapter 2: The Indian Contract Act, 1872 — വിശദമായ Notes</h2>

      <h3>1. Contract എന്താൽ? (Nature of Contract)</h3>
      <p><strong>Section 2(h):</strong> Contract = Agreement + Legal Enforceability</p>
      <ul>
        <li><strong>Agreement</strong> — Offer + Acceptance</li>
        <li><strong>Enforceable by law</strong> — കോടതിയിൽ നടപ്പിലാക്കാൻ കഴിയണം</li>
      </ul>
      <p>Agreement-ന്റെ types: <strong>Valid Contract</strong> (എല്ലാ elements ഉള്ളത്), <strong>Void Agreement</strong> (തുടക്കം മുതൽ enforceable അല്ലാത്തത്), <strong>Voidable Contract</strong> (cancel ചെയ്യാൻ അവകാശമുള്ളത്), <strong>Illegal Agreement</strong>, <strong>Unenforceable Contract</strong> (procedural കുറവ് കൊണ്ട്).</p>

      <h3>2. Essential Elements of a Valid Contract (Section 10)</h3>
      <ol>
        <li><strong>Offer & Acceptance</strong> — clear offer, unqualified acceptance</li>
        <li><strong>Intention to create legal relationship</strong> — social agreements ഇതിൽ പെടില്ല</li>
        <li><strong>Lawful Consideration</strong></li>
        <li><strong>Capacity of Parties</strong> — 18 വയസ്സ്, sound mind</li>
        <li><strong>Free Consent</strong></li>
        <li><strong>Lawful Object</strong></li>
        <li><strong>Not expressly declared void</strong></li>
      </ol>
      <p><strong>Example:</strong> A പറയുന്നു "എന്റെ bike ₹50,000-ന് വിൽക്കാം," B പറയുന്നു "ശരി." — Valid contract.</p>

      <h3>3. Consideration</h3>
      <p>ഒരു party മറ്റൊരു party-ക്ക് വേണ്ടി ചെയ്യുന്ന/ചെയ്യാൻ സമ്മതിക്കുന്ന എന്തെങ്കിലും — money, service, goods, അല്ലെങ്കിൽ promise.</p>
      <ul>
        <li>Consideration <strong>lawful</strong> ആയിരിക്കണം</li>
        <li>Already നിലവിലുള്ള legal obligation-ന് extra പണം വാഗ്ദാനം ചെയ്താൽ അത് valid consideration അല്ല</li>
        <li><strong>"No consideration, no contract"</strong> — Exception: natural love and affection ഉള്ള, registered agreements (Section 25)</li>
      </ul>

      <h3>4. Capacity to Contract</h3>
      <p>18 വയസ്സ് കഴിഞ്ഞ, sound mind ഉള്ള, നിയമപ്രകാരം disqualify ചെയ്യപ്പെടാത്തവർ.</p>
      <p><strong>Minor-മായുള്ള agreement:</strong> <strong>void ab initio</strong> (തുടക്കം മുതൽ അസാധുവാണ്). Minor-ന് ബാധ്യത ഉണ്ടാകില്ല, പക്ഷേ minor-ന് benefit കിട്ടുന്ന agreements allowed ആണ്.</p>

      <h3>5. Free Consent</h3>
      <table>
        <tr><th>ഘടകം</th><th>അർത്ഥം</th><th>Effect</th></tr>
        <tr><td>Coercion</td><td>ബലം പ്രയോഗിച്ച് സമ്മതം വാങ്ങൽ</td><td>Voidable</td></tr>
        <tr><td>Undue Influence</td><td>സ്വാധീനം misuse ചെയ്യൽ</td><td>Voidable</td></tr>
        <tr><td>Fraud</td><td>മനഃപൂർവ്വം തെറ്റായ വിവരം</td><td>Voidable</td></tr>
        <tr><td>Misrepresentation</td><td>അറിയാതെ തെറ്റായ വിവരം</td><td>Voidable</td></tr>
        <tr><td>Mistake</td><td>രണ്ട് പേരും തെറ്റിദ്ധരിക്കൽ</td><td>Void (bilateral mistake)</td></tr>
      </table>

      <h3>6. Performance of Contract</h3>
      <ul>
        <li><strong>Actual Performance</strong> — obligation പൂർണ്ണമായി നിറവേറ്റുന്നത്</li>
        <li><strong>Attempted Performance (Tender)</strong> — ready and willing, പക്ഷേ accept ചെയ്യുന്നില്ല</li>
      </ul>

      <h3>7. Breach of Contract & Remedies</h3>
      <p><strong>Types:</strong> Actual Breach (due date-ന് perform ചെയ്യാതിരിക്കൽ), Anticipatory Breach (മുൻപ് തന്നെ പറയൽ)</p>
      <p><strong>Remedies:</strong></p>
      <ol>
        <li><strong>Damages</strong> — നഷ്ടപരിഹാരം</li>
        <li><strong>Specific Performance</strong> — promise ചെയ്ത കാര്യം തന്നെ ചെയ്യിക്കൽ</li>
        <li><strong>Injunction</strong> — ചെയ്യാതിരിക്കാൻ ഉത്തരവ്</li>
        <li><strong>Rescission</strong> — contract cancel ചെയ്യൽ</li>
        <li><strong>Quantum Meruit</strong> — ഭാഗിക work-ന് ന്യായമായ പ്രതിഫലം</li>
      </ol>

      <h3>8. Contingent & Quasi Contract</h3>
      <p><strong>Contingent Contract:</strong> ഭാവിയിലെ uncertain event-നെ depend ചെയ്യുന്ന contract. Example: "മഴ പെയ്താൽ ₹1000 തരാം."</p>
      <p><strong>Quasi Contract:</strong> യഥാർത്ഥ contract ഇല്ലെങ്കിലും unjust enrichment ഒഴിവാക്കാൻ നിയമം ചുമത്തുന്ന ബാധ്യത.</p>

      <h3>9. Indemnity & Guarantee</h3>
      <p><strong>Indemnity:</strong> ഒരു party നഷ്ടം compensate ചെയ്യാൻ promise ചെയ്യുന്നത് (2 parties).</p>
      <p><strong>Guarantee:</strong> മൂന്നാമത്തെ party (Surety) മറ്റൊരാളുടെ obligation നിറവേറ്റാമെന്ന് promise ചെയ്യുന്നത് (3 parties: Surety, Principal Debtor, Creditor).</p>

      <h3>10. Bailment & Pledge</h3>
      <p><strong>Bailment:</strong> Goods ഒരു purpose-ന് വേണ്ടി കൈമാറൽ, purpose കഴിഞ്ഞാൽ തിരിച്ചു കൊടുക്കണം.</p>
      <p><strong>Pledge:</strong> Bailment-ന്റെ special type — goods loan-ന് security ആയി കൊടുക്കൽ.</p>

      <h3>11. Contract of Agency</h3>
      <p>Agent മറ്റൊരാൾക്ക് (Principal) വേണ്ടി പ്രവർത്തിക്കാൻ authorize ചെയ്യപ്പെട്ട വ്യക്തി. Agency contract-ന് consideration ആവശ്യമില്ല എന്നത് ഒരു exception ആണ്.</p>

/* ---------------- STORAGE HELPERS ---------------- */
async function loadProgress(){
  try{
    const res = await window.storage.get('bl-progress', false);
    return res ? JSON.parse(res.value) : {};
  }catch(e){
    return {};
  }
}
async function saveProgress(data){
  try{
    await window.storage.set('bl-progress', JSON.stringify(data), false);
  }catch(e){ /* fail silently, keep going in-memory */ }
}

let progress = {}; // { ch1: {attempted: n, correct: n}, ... }

/* ---------------- SYLLABUS RENDER ---------------- */
function renderSyllabus(){
  const el = document.getElementById('syllabus');
  el.innerHTML = chapters.map(c => {
    const p = progress[c.id];
    const done = p && p.attempted >= c.questions.length;
    const stampText = done ? "Reviewed" : (p && p.attempted > 0 ? "In Progress" : "Not Started");
    return `
      <div class="docket">
        <div class="docket-head">
          <div>
            <div class="docket-num">Chapter ${c.num}</div>
            <h3>${c.title}</h3>
          </div>
          <div class="stamp ${done ? '' : 'pending'}">${stampText}</div>
        </div>
        <ul class="topics">${c.topics.map(t => `<li>${t}</li>`).join('')}</ul>
      </div>
    `;
  }).join('');
}

/* ---------------- NOTES ---------------- */
function renderNotesSelect(){
  const sel = document.getElementById('notesSelect');
  sel.innerHTML = chapters.map((c,i) => `<option value="${i}">Chapter ${c.num}: ${c.title}</option>`).join('');
  sel.addEventListener('change', e => renderNotes(parseInt(e.target.value)));
}
function renderNotes(idx){
  const chapter = chapters[idx];
  const area = document.getElementById('notesArea');
  if(chapter.notes){
    area.innerHTML = `<div class="notes-body">${chapter.notes}</div>`;
  } else {
    area.innerHTML = `<div class="notes-body"><div class="notes-missing">ഈ chapter-ന്റെ detailed notes ഇതുവരെ ചേർത്തിട്ടില്ല. Chapter ${chapter.num}-ന്റെ notes വേണമെങ്കിൽ ചോദിക്കൂ.</div></div>`;
  }
}

/* ---------------- PRACTICE ---------------- */
let currentChapterIdx = 0;
let currentQIdx = 0;
let currentScore = 0;
let answered = false;

function renderChapterSelect(){
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = chapters.map((c,i) => `<option value="${i}">Chapter ${c.num}: ${c.title}</option>`).join('');
  sel.addEventListener('change', e => {
    currentChapterIdx = parseInt(e.target.value);
    startQuiz();
  });
}

function startQuiz(){
  currentQIdx = 0;
  currentScore = 0;
  renderQuestion();
}

function renderQuestion(){
  const chapter = chapters[currentChapterIdx];
  const area = document.getElementById('quizArea');

  if(currentQIdx >= chapter.questions.length){
    area.innerHTML = `
      <div class="quiz-card quiz-done">
        <div class="q-progress">CHAPTER COMPLETE</div>
        <div class="score">${currentScore} / ${chapter.questions.length}</div>
        <div style="color:var(--ink-soft);font-size:13.5px;">correct answers this attempt</div>
        <button class="next-btn show" style="margin-top:20px;" onclick="startQuiz()">Retry Chapter</button>
      </div>
    `;
    return;
  }

  const q = chapter.questions[currentQIdx];
  answered = false;
  area.innerHTML = `
    <div class="quiz-card">
      <div class="q-progress">QUESTION ${currentQIdx+1} OF ${chapter.questions.length}</div>
      <p class="q-text">${q.q}</p>
      ${q.opts.map((opt,i) => `<button class="opt" data-idx="${i}">${String.fromCharCode(97+i)}) ${opt}</button>`).join('')}
      <div class="explain" id="explainBox">${q.exp}</div>
      <button class="next-btn" id="nextBtn">Next →</button>
    </div>
  `;

  document.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx), q));
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentQIdx++;
    renderQuestion();
  });
}

async function handleAnswer(idx, q){
  if(answered) return;
  answered = true;
  const opts = document.querySelectorAll('.opt');
  opts.forEach((btn,i) => {
    btn.disabled = true;
    if(i === q.correct) btn.classList.add('correct');
    else if(i === idx) btn.classList.add('wrong');
  });
  document.getElementById('explainBox').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');

  const chId = chapters[currentChapterIdx].id;
  if(!progress[chId]) progress[chId] = {attempted:0, correct:0};
  progress[chId].attempted++;
  if(idx === q.correct){
    currentScore++;
    progress[chId].correct++;
  }
  await saveProgress(progress);
}

/* ---------------- PROGRESS TAB ---------------- */
function renderProgressTab(){
  const el = document.getElementById('progress');
  let totalAttempted = 0, totalCorrect = 0, totalQ = 0;
  chapters.forEach(c => {
    totalQ += c.questions.length;
    const p = progress[c.id];
    if(p){ totalAttempted += p.attempted; totalCorrect += p.correct; }
  });
  const acc = totalAttempted ? Math.round((totalCorrect/totalAttempted)*100) : 0;

  el.innerHTML = `
    <div class="stat-row">
      <div class="stat-box"><div class="num">${totalAttempted}</div><div class="lbl">Questions Attempted</div></div>
      <div class="stat-box"><div class="num">${totalCorrect}</div><div class="lbl">Correct Answers</div></div>
      <div class="stat-box"><div class="num">${acc}%</div><div class="lbl">Accuracy</div></div>
    </div>
    <div class="docket">
      ${chapters.map(c => {
        const p = progress[c.id] || {attempted:0, correct:0};
        const pct = p.attempted ? Math.round((p.correct/p.attempted)*100) : 0;
        return `
          <div class="prog-item">
            <div class="prog-name">${c.title}</div>
            <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
            <div class="prog-pct">${pct}%</div>
          </div>
        `;
      }).join('')}
      ${totalAttempted === 0 ? '<div class="empty-note">No questions attempted yet — start in the Practice tab.</div>' : ''}
    </div>
    <span class="reset-link" id="resetLink">Reset all progress</span>
  `;
  document.getElementById('resetLink').addEventListener('click', async () => {
    if(confirm('Reset all progress? This cannot be undone.')){
      progress = {};
      await saveProgress(progress);
      renderSyllabus();
      renderProgressTab();
    }
  });
}

    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(tab).classList.add('active');
    if(tab === 'progress') renderProgressTab();
    if(tab === 'syllabus') renderSyllabus();
  });
});

/* ---------------- INIT ---------------- */
(async function init(){
  progress = await loadProgress();
  renderSyllabus();
  renderChapterSelect();
  renderNotesSelect();
  renderNotes(0);
  startQuiz();
})();
</script>
